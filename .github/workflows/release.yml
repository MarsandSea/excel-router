name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests (block release on failure)
        run: pytest -q

      - name: Syntax check
        shell: bash
        run: python -m py_compile main.py core/*.py gui/*.py

      - name: Extract version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Mirror code + tag to Gitee
        # Best-effort: Gitee sync must never block the official GitHub release.
        # Requires repo secret GITEE (Gitee personal access token with
        # repo/projects write scope). Gitee's HTTPS git auth accepts the
        # literal username "oauth2" with the token as password. Force-push
        # because Gitee is a pure mirror -- it should never diverge on its own.
        continue-on-error: true
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE }}
        run: |
          $url = "https://oauth2:${env:GITEE_TOKEN}@gitee.com/Marsandsea/Excelrouter.git"
          git remote add gitee $url
          git push gitee HEAD:refs/heads/main --force
          git push gitee "refs/tags/${{ github.ref_name }}" --force

      - name: Build onedir (recommended distribution)
        run: >
          pyinstaller --onedir --noconsole
          --name "ExcelRouter"
          --icon app.ico
          --version-file version.txt
          --collect-all customtkinter
          --add-data "config;config"
          --add-data "app.ico;."
          main.py

      - name: Build onefile (single-file fallback)
        run: >
          pyinstaller --onefile --noconsole
          --name "ExcelRouter-onefile"
          --icon app.ico
          --version-file version.txt
          --collect-all customtkinter
          --add-data "config;config"
          --add-data "app.ico;."
          main.py

      - name: Package onedir as zip
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          Compress-Archive -Path "dist/ExcelRouter/*" -DestinationPath "dist/ExcelRouter-v$ver-win64.zip"
          Rename-Item "dist/ExcelRouter-onefile.exe" "ExcelRouter-v$ver.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ExcelRouter-v${{ steps.ver.outputs.version }}-win64.zip
            dist/ExcelRouter-v${{ steps.ver.outputs.version }}.exe
          generate_release_notes: true

      - name: Create Gitee Release
        # Best-effort mirror of the release metadata via Gitee API v5.
        # If the tag doesn't exist yet on Gitee, target_commitish makes
        # Gitee create it automatically pointing at this exact commit.
        id: gitee_release
        continue-on-error: true
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE }}
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $body = @{
            access_token     = $env:GITEE_TOKEN
            tag_name         = "v$ver"
            name             = "v$ver"
            target_commitish = "${{ github.sha }}"
            body             = "同步自 GitHub Release，完整更新说明见: https://github.com/MarsandSea/excel-router/releases/tag/v$ver"
          }
          $resp = Invoke-RestMethod -Uri "https://gitee.com/api/v5/repos/Marsandsea/Excelrouter/releases" -Method Post -Body $body
          "release_id=$($resp.id)" >> $env:GITHUB_OUTPUT

      - name: Upload assets to Gitee Release
        if: steps.gitee_release.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE }}
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $releaseId = "${{ steps.gitee_release.outputs.release_id }}"
          $files = @(
            "dist/ExcelRouter-v$ver-win64.zip",
            "dist/ExcelRouter-v$ver.exe"
          )
          foreach ($f in $files) {
            Invoke-RestMethod -Uri "https://gitee.com/api/v5/repos/Marsandsea/Excelrouter/releases/$releaseId/attach_files" `
              -Method Post `
              -Form @{ access_token = $env:GITEE_TOKEN; file = Get-Item $f }
          }
