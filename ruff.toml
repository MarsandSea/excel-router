# Ruff 静态检查配置（只做 lint，不用 ruff format——现有代码有对齐赋值风格）
line-length = 120
target-version = "py39"

[lint]
# E2/E5 不选：对齐赋值与长中文文案行会误报；其余取常用错误类
select = ["E4", "E7", "E9", "F", "B", "UP"]

[lint.per-file-ignores]
# 存量代码风格豁免（紧凑单行 if、循环变量命名、立即执行的 lambda 误报）；新代码不适用
"core/splitter.py" = ["E701", "B007", "B023"]
"tests/*" = ["E702", "F401"]
