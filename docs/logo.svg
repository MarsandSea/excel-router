<svg viewBox="0 0 256 256" width="256" height="256" xmlns="http://www.w3.org/2000/svg" role="img">
  <!-- Copyright (c) 2026 AbeLin · MIT License -->
  <title>ExcelRouter</title>
  <desc>绿色圆角方块底,白色表格分发到三个文件,macOS 风格应用图标</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#35A566"/>
      <stop offset="0.55" stop-color="#1E7F4B"/>
      <stop offset="1" stop-color="#12603A"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E7F1EA"/>
    </linearGradient>
    <linearGradient id="sheenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glyphShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#07301B" flood-opacity="0.38"/>
    </filter>
    <filter id="plateShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- 底板:Big Sur 圆角比例,纵向光照渐变 -->
  <rect x="16" y="14" width="224" height="224" rx="50" fill="url(#bgGrad)" filter="url(#plateShadow)"/>
  <!-- 内侧一像素高光描边 -->
  <rect x="17.5" y="15.5" width="221" height="221" rx="48.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="2"/>

  <g filter="url(#glyphShadow)">
    <!-- 源表 -->
    <rect x="46" y="84" width="58" height="86" rx="11" fill="url(#paperGrad)"/>
    <!-- 连接线 -->
    <path d="M108 127 H160" stroke="#FFFFFF" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M108 127 H126 Q140 127 140 113 V80 Q140 66 154 66 H160" stroke="#FFFFFF" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M108 127 H126 Q140 127 140 141 V174 Q140 188 154 188 H160" stroke="#FFFFFF" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- 三个目标文件 -->
    <rect x="164" y="45" width="43" height="43" rx="10" fill="url(#paperGrad)"/>
    <rect x="164" y="106" width="43" height="43" rx="10" fill="url(#paperGrad)"/>
    <rect x="164" y="167" width="43" height="43" rx="10" fill="url(#paperGrad)"/>
  </g>

  <!-- 纸面行线 -->
  <line x1="57" y1="111" x2="93" y2="111" stroke="#1E7F4B" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="57" y1="127" x2="93" y2="127" stroke="#1E7F4B" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="57" y1="143" x2="93" y2="143" stroke="#1E7F4B" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="174" y1="66.5" x2="197" y2="66.5" stroke="#1E7F4B" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="174" y1="127.5" x2="197" y2="127.5" stroke="#1E7F4B" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="174" y1="188.5" x2="197" y2="188.5" stroke="#1E7F4B" stroke-width="6.5" stroke-linecap="round"/>

  <!-- 顶部高光 -->
  <rect x="16" y="14" width="224" height="224" rx="50" fill="url(#sheenGrad)"/>
</svg>
